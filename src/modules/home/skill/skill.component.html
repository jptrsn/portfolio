<div class="skill-container" fxLayout="column" fxFlex="1 0 100">
  <div #triggerHidden></div>
  <mat-card [@fadeInOut]="(animate$ | async)">
    <mat-card-header>
      <mat-card-title>
        {{skill.title}}
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>{{skill.description}}</mat-card-content>
  </mat-card>
  <div #triggerVisible></div>
</div>
